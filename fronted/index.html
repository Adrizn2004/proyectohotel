<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hotel Mour | Acceso Corporativo</title>
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #0A0F1C 0%, #12182B 50%, #1A1F32 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Fondo dinámico más sutil y formal */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 40%, rgba(80, 100, 150, 0.12) 0%, rgba(0, 0, 0, 0) 70%);
            animation: drift 30s infinite alternate ease-in-out;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            width: 180%;
            height: 180%;
            background: radial-gradient(circle at 80% 70%, rgba(60, 80, 120, 0.08) 0%, rgba(0, 0, 0, 0) 65%);
            animation: driftReverse 24s infinite alternate ease-in-out;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes drift {
            0% { transform: translate(-10%, -10%); opacity: 0.5; }
            100% { transform: translate(10%, 10%); opacity: 0.8; }
        }

        @keyframes driftReverse {
            0% { transform: translate(10%, 10%); opacity: 0.3; }
            100% { transform: translate(-15%, -15%); opacity: 0.7; }
        }

        /* contenedor principal */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            padding: 1.5rem;
            margin: 1rem;
        }

        /* Tarjeta glassmorfismo refinado */
        .login-card {
            background: rgba(12, 18, 30, 0.75);
            backdrop-filter: blur(18px);
            border-radius: 2rem;
            padding: 2.2rem 2rem 2.5rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.06);
            transition: transform 0.3s ease, box-shadow 0.4s ease;
            animation: cardFloatIn 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .login-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 35px 55px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        @keyframes cardFloatIn {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
                backdrop-filter: blur(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Logo y encabezado - sin icono */
        .hotel-brand {
            text-align: center;
            margin-bottom: 2rem;
        }
        .hotel-brand h2 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(130deg, #F0F3FA, #C8D3EB);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.4rem;
        }
        .hotel-brand p {
            color: #8E9EBB;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.4px;
        }

        /* campos de entrada elegantes */
        .input-group {
            margin-bottom: 1.6rem;
            position: relative;
        }

        .input-field {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 1.6rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.25s ease;
            backdrop-filter: blur(4px);
        }
        .input-field:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(200, 180, 120, 0.5);
        }
        .input-field.focused {
            border-color: #B8A46B;
            background: rgba(255, 255, 255, 0.09);
            box-shadow: 0 0 0 3px rgba(184, 164, 107, 0.2);
        }

        .input-field i:first-child {
            padding-left: 1.2rem;
            font-size: 1.1rem;
            color: #8E9EBB;
            transition: color 0.2s;
        }
        .input-field input {
            background: transparent;
            border: none;
            padding: 1rem 0.8rem;
            font-size: 0.95rem;
            width: 100%;
            color: #EDF2FB;
            font-weight: 500;
            outline: none;
            font-family: 'Inter', sans-serif;
        }
        .input-field input::placeholder {
            color: rgba(140, 160, 190, 0.7);
            font-weight: 400;
            font-size: 0.85rem;
        }
        /* Botón de mostrar/ocultar contraseña */
        .toggle-password {
            cursor: pointer;
            padding-right: 1.2rem;
            font-size: 1rem;
            color: #8E9EBB;
            transition: color 0.2s, transform 0.1s;
        }
        .toggle-password:hover {
            color: #B8A46B;
            transform: scale(1.05);
        }

        /* opciones extra */
        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0.8rem 0 1.8rem;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #A1B0CC;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .checkbox-label input {
            accent-color: #B8A46B;
            width: 1rem;
            height: 1rem;
            cursor: pointer;
        }
        .forgot-link {
            color: #B8A46B;
            font-size: 0.8rem;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .forgot-link:hover {
            color: #DBCE9C;
            text-decoration: underline;
        }

        /* Botón principal formal */
        .login-btn {
            width: 100%;
            padding: 0.9rem;
            border-radius: 2rem;
            border: none;
            background: linear-gradient(95deg, #2C3548, #1E2538);
            color: #EFF3FC;
            font-weight: 600;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.8px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border: 1px solid rgba(184, 164, 107, 0.3);
        }
        .login-btn i {
            font-size: 0.9rem;
            transition: transform 0.2s;
        }
        .login-btn:hover {
            background: linear-gradient(95deg, #3B465F, #2A3248);
            transform: scale(1.01);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            border-color: rgba(184, 164, 107, 0.6);
        }
        .login-btn:active {
            transform: scale(0.98);
        }
        .login-btn.loading {
            pointer-events: none;
            opacity: 0.85;
            background: linear-gradient(95deg, #2B3248, #1F2538);
        }
        .btn-spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid #EFF3FC;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* mensajes de feedback */
        .message-area {
            min-height: 52px;
            margin-top: 1.2rem;
            margin-bottom: 0rem;
        }
        .dynamic-message {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            padding: 0.7rem 1rem;
            border-radius: 1.8rem;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            font-size: 0.85rem;
            font-weight: 500;
            animation: slideMsg 0.3s ease forwards;
            border-left: 4px solid;
        }
        .dynamic-message.error {
            border-left-color: #C66B6B;
            color: #FFD8D8;
        }
        .dynamic-message.success {
            border-left-color: #7FAA7A;
            color: #DAF0D6;
        }
        .dynamic-message i {
            font-size: 1rem;
        }
        @keyframes slideMsg {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* demo hint */
        .demo-hint {
            text-align: center;
            margin-top: 1.6rem;
            font-size: 0.7rem;
            color: #7A89A8;
            background: rgba(0,0,0,0.3);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 0.3rem 1rem;
            border-radius: 50px;
            backdrop-filter: blur(2px);
        }
        .demo-hint i {
            margin-right: 6px;
            font-size: 0.7rem;
        }

        /* shake dinamico para error */
        .shake-effect {
            animation: shakeBox 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }
        @keyframes shakeBox {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-2px); }
            80% { transform: translateX(2px); }
        }

        /* responsiveness */
        @media (max-width: 520px) {
            .login-card {
                padding: 1.8rem 1.5rem 2rem;
            }
            .hotel-brand h2 {
                font-size: 1.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="hotel-brand">
                <!-- Icono eliminado por solicitud -->
                <h2>Hotel Mour</h2>
                <p>Acceso corporativo · Gestión ejecutiva</p>
            </div>

            <form id="form-login" novalidate>
                <div class="input-group">
                    <div class="input-field" id="email-field">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="correo" placeholder="Correo electrónico" value="admin@hotel.com" autocomplete="email">
                    </div>
                </div>

                <div class="input-group">
                    <div class="input-field" id="password-field">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="contrasena" placeholder="Contraseña" value="123456" autocomplete="current-password">
                        <i class="fas fa-eye-slash toggle-password" id="togglePwIcon"></i>
                    </div>
                </div>

                <div class="options-row">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberCheck"> Mantener sesión
                    </label>
                    <a href="#" class="forgot-link" id="forgotMock"><i class="fas fa-key"></i> ¿Olvidaste clave?</a>
                </div>

                <button type="submit" class="login-btn" id="loginButton">
                    <span>INGRESAR</span>
                    <i class="fas fa-arrow-right-to-bracket"></i>
                </button>

                <div class="message-area" id="messageArea"></div>
            </form>
            <div class="demo-hint">
                <i class="fas fa-hotel"></i> Demo: admin@hotel.com / 123456
            </div>
        </div>
    </div>

    <script>
        (function(){
            // ----- Elementos del DOM -----
            const form = document.getElementById('form-login');
            const emailInput = document.getElementById('correo');
            const passwordInput = document.getElementById('contrasena');
            const loginBtn = document.getElementById('loginButton');
            const messageArea = document.getElementById('messageArea');
            const rememberCheck = document.getElementById('rememberCheck');
            const toggleIcon = document.getElementById('togglePwIcon');
            const emailFieldDiv = document.getElementById('email-field');
            const passwordFieldDiv = document.getElementById('password-field');

            // Credenciales válidas (Hotel Mour)
            const VALID_EMAIL = "admin@hotel.com";
            const VALID_PASSWORD = "123456";

            // ----- Funciones auxiliares UI dinámica -----
            function showMessage(message, type = 'error') {
                messageArea.innerHTML = '';
                const msgDiv = document.createElement('div');
                msgDiv.className = `dynamic-message ${type}`;
                const icon = type === 'success' ? '<i class="fas fa-check-circle"></i>' : '<i class="fas fa-exclamation-triangle"></i>';
                msgDiv.innerHTML = `${icon} <span>${message}</span>`;
                messageArea.appendChild(msgDiv);
                if (type === 'success') {
                    setTimeout(() => {
                        if (messageArea.firstChild === msgDiv) {
                            msgDiv.style.opacity = '0';
                            setTimeout(() => {
                                if (msgDiv.parentNode) msgDiv.remove();
                            }, 300);
                        }
                    }, 2800);
                }
            }

            function clearMessage() {
                if (messageArea.firstChild) {
                    messageArea.innerHTML = '';
                }
            }

            function shakeCard() {
                const card = document.querySelector('.login-card');
                card.classList.add('shake-effect');
                setTimeout(() => {
                    card.classList.remove('shake-effect');
                }, 400);
            }

            function setupInputFocus() {
                const inputs = [emailInput, passwordInput];
                const fields = [emailFieldDiv, passwordFieldDiv];
                inputs.forEach((input, idx) => {
                    input.addEventListener('focus', () => {
                        fields[idx].classList.add('focused');
                    });
                    input.addEventListener('blur', () => {
                        fields[idx].classList.remove('focused');
                    });
                });
            }

            function setupPasswordToggle() {
                if (toggleIcon) {
                    toggleIcon.addEventListener('click', function(e) {
                        e.preventDefault();
                        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                        passwordInput.setAttribute('type', type);
                        if (type === 'text') {
                            toggleIcon.classList.remove('fa-eye-slash');
                            toggleIcon.classList.add('fa-eye');
                        } else {
                            toggleIcon.classList.remove('fa-eye');
                            toggleIcon.classList.add('fa-eye-slash');
                        }
                    });
                }
            }

            function setLoadingState(isLoading) {
                if (isLoading) {
                    loginBtn.classList.add('loading');
                    loginBtn.disabled = true;
                    const originalContent = loginBtn.innerHTML;
                    loginBtn.setAttribute('data-original', originalContent);
                    loginBtn.innerHTML = `<span class="btn-spinner"></span><span>Verificando...</span>`;
                } else {
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                    const original = loginBtn.getAttribute('data-original');
                    if (original) {
                        loginBtn.innerHTML = original;
                    } else {
                        loginBtn.innerHTML = `<span>INGRESAR</span><i class="fas fa-arrow-right-to-bracket"></i>`;
                    }
                }
            }

            function authenticate(email, password) {
                const cleanEmail = email.trim().toLowerCase();
                const cleanPassword = password;
                return (cleanEmail === VALID_EMAIL && cleanPassword === VALID_PASSWORD);
            }

            function saveRememberMe() {
                if (rememberCheck.checked) {
                    localStorage.setItem('rememberEmail', emailInput.value.trim());
                    localStorage.setItem('rememberFlag', 'true');
                } else {
                    localStorage.removeItem('rememberEmail');
                    localStorage.setItem('rememberFlag', 'false');
                }
            }

            function loadRememberMe() {
                const flag = localStorage.getItem('rememberFlag');
                if (flag === 'true') {
                    const savedEmail = localStorage.getItem('rememberEmail');
                    if (savedEmail) {
                        emailInput.value = savedEmail;
                        rememberCheck.checked = true;
                    }
                } else {
                    rememberCheck.checked = false;
                }
            }

            async function handleSubmit(e) {
                e.preventDefault();
                clearMessage();
                
                const email = emailInput.value;
                const password = passwordInput.value;

                if (!email.trim() || !password.trim()) {
                    showMessage('❌ Por favor, completa ambos campos.', 'error');
                    shakeCard();
                    if (!email.trim()) emailFieldDiv.style.transform = 'scale(0.99)';
                    if (!password.trim()) passwordFieldDiv.style.transform = 'scale(0.99)';
                    setTimeout(() => {
                        emailFieldDiv.style.transform = '';
                        passwordFieldDiv.style.transform = '';
                    }, 200);
                    return;
                }

                const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    showMessage('📧 Formato de correo inválido', 'error');
                    shakeCard();
                    return;
                }

                setLoadingState(true);
                await new Promise(resolve => setTimeout(resolve, 480));
                
                const isAuth = authenticate(email, password);
                
                if (isAuth) {
                    saveRememberMe();
                    showMessage(`✨ Bienvenido, administrador. Redirigiendo al panel...`, 'success');
                    setLoadingState(false);
                    loginBtn.disabled = true;
                    loginBtn.style.opacity = '0.7';
                    const originalBtnHTML = loginBtn.innerHTML;
                    loginBtn.innerHTML = `<i class="fas fa-check-circle"></i> Acceso concedido`;
                    
                    setTimeout(() => {
                        loginBtn.disabled = false;
                        loginBtn.style.opacity = '1';
                        loginBtn.innerHTML = originalBtnHTML;
                        showMessage('🚀 Acceso autorizado · Panel de administración cargado.', 'success');
                        createConfettiEffect();
                        setLoadingState(false);
                        sessionStorage.setItem('auth_success', 'true');
                    }, 1300);
                } else {
                    setLoadingState(false);
                    showMessage('🔒 Acceso denegado. Credenciales incorrectas.', 'error');
                    shakeCard();
                    emailFieldDiv.style.borderColor = '#C66B6B';
                    passwordFieldDiv.style.borderColor = '#C66B6B';
                    setTimeout(() => {
                        emailFieldDiv.style.borderColor = '';
                        passwordFieldDiv.style.borderColor = '';
                    }, 500);
                    passwordInput.value = '';
                }
            }

            function createConfettiEffect() {
                const confettiCount = 35;
                for (let i = 0; i < confettiCount; i++) {
                    const conf = document.createElement('div');
                    conf.style.position = 'fixed';
                    conf.style.width = '6px';
                    conf.style.height = '6px';
                    conf.style.backgroundColor = `hsl(${Math.random() * 60 + 30}, 70%, 55%)`;
                    conf.style.borderRadius = '2px';
                    conf.style.left = Math.random() * window.innerWidth + 'px';
                    conf.style.top = '-10px';
                    conf.style.opacity = '0.7';
                    conf.style.pointerEvents = 'none';
                    conf.style.zIndex = '9999';
                    document.body.appendChild(conf);
                    const duration = 700 + Math.random() * 600;
                    const destination = window.innerHeight - 50;
                    conf.animate([
                        { transform: `translateY(0px) rotate(0deg)`, opacity: 0.8 },
                        { transform: `translateY(${destination}px) rotate(${Math.random() * 360}deg)`, opacity: 0 }
                    ], { duration: duration, easing: 'cubic-bezier(0.2,0.9,0.4,1)' });
                    setTimeout(() => conf.remove(), duration);
                }
            }

            function setupForgotLink() {
                const forgotLink = document.getElementById('forgotMock');
                if (forgotLink) {
                    forgotLink.addEventListener('click', (e) => {
                        e.preventDefault();
                        showMessage('🔐 Restablecimiento: contacte con soporte@hotelmour.com o use demo: admin@hotel.com / 123456', 'error');
                    });
                }
            }

            function setupLiveValidation() {
                const clearErrorOnInput = () => {
                    clearMessage();
                    emailFieldDiv.style.borderColor = '';
                    passwordFieldDiv.style.borderColor = '';
                };
                emailInput.addEventListener('input', clearErrorOnInput);
                passwordInput.addEventListener('input', clearErrorOnInput);
            }

            loadRememberMe();
            form.addEventListener('submit', handleSubmit);
            setupInputFocus();
            setupPasswordToggle();
            setupForgotLink();
            setupLiveValidation();

            setTimeout(() => {
                const hintMsg = document.querySelector('.demo-hint');
                if (hintMsg) hintMsg.style.opacity = '0.9';
            }, 200);
            
            if (sessionStorage.getItem('auth_success') === 'true') {
                setTimeout(() => {
                    showMessage('🛎️ Sesión previa activa · Bienvenido de nuevo', 'success');
                    sessionStorage.removeItem('auth_success');
                }, 300);
            }
        })();
    </script>
</body>
</html>
