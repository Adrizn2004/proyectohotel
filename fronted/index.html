<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Hotel</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h2>Iniciar Sesión</h2>
        <form id="form-login">
            <input type="email" id="correo" placeholder="Correo electrónico" required value="admin@hotel.com">
            <input type="password" id="contrasena" placeholder="Contraseña" required value="123456">
            <button type="submit">Ingresar</button>
        </form>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
