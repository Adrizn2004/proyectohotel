<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hotel Mour | Editar reserva</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter', sans-serif; background:#eef2f7; color:#1a2c3e; padding:2rem 1.5rem; }
        .container { max-width:640px; margin:0 auto; }
        .back-link { color:#2c7da0; text-decoration:none; font-weight:600; font-size:0.9rem; display:inline-flex; align-items:center; gap:6px; margin-bottom:1.2rem; }
        .back-link:hover { text-decoration:underline; }
        .card { background:white; border-radius:32px; box-shadow:0 20px 35px -12px rgba(0,0,0,0.08); padding:2rem 2.2rem; }
        .card h2 { font-size:1.5rem; color:#0b3b44; display:flex; align-items:center; gap:10px; margin-bottom:0.4rem; }
        .card > p { color:#4e6e7c; font-size:0.85rem; margin-bottom:1.6rem; }
        .form-row { display:flex; gap:1rem; flex-wrap:wrap; }
        .form-group { flex:1; min-width:200px; margin-bottom:1.2rem; }
        .form-group label { display:block; font-weight:600; font-size:0.85rem; margin-bottom:0.5rem; color:#1f3b44; }
        .form-group input { width:100%; padding:0.8rem 1rem; border:1px solid #cbd5e1; border-radius:1rem; font-size:0.9rem; font-family:inherit; }
        .form-group input:focus { outline:none; border-color:#2c7da0; box-shadow:0 0 0 3px rgba(44,125,160,0.15); }
        .btn-primary { background:#2c7da0; border:none; padding:0.7rem 1.8rem; border-radius:60px; font-weight:700; color:white; cursor:pointer; display:inline-flex; align-items:center; gap:8px; }
        .btn-primary:hover { background:#1f5e7a; }
        .msg-area { margin-top:1.2rem; }
        .dynamic-msg { padding:0.8rem 1.2rem; border-radius:1rem; font-size:0.85rem; font-weight:500; border-left:4px solid #2b8c7a; background:#e9f3ef; color:#1e6f5c; display:flex; align-items:center; gap:8px; }
    </style>
</head>
<body>
<div class="container">
    <a href="admin.html" class="back-link"><i class="fas fa-arrow-left"></i> Volver al panel de administración</a>
    <div class="card">
        <h2><i class="fas fa-pen-alt" style="color:#bc6f2c;"></i> Editar reserva <span id="reservaIdLabel"></span></h2>
        <p>Actualiza los datos de la reserva del cliente</p>
        <form id="formEditar">
            <div class="form-group">
                <label for="cliente">Cliente</label>
                <input type="text" id="cliente" required>
            </div>
            <div class="form-group">
                <label for="habitacion">Habitación</label>
                <input type="text" id="habitacion" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="checkin">Check-In</label>
                    <input type="text" id="checkin" placeholder="dd/mm/aaaa" required>
                </div>
                <div class="form-group">
                    <label for="checkout">Check-Out</label>
                    <input type="text" id="checkout" placeholder="dd/mm/aaaa" required>
                </div>
            </div>
            <button type="submit" class="btn-primary"><i class="fas fa-floppy-disk"></i> Guardar cambios</button>
            <div class="msg-area" id="msgArea"></div>
        </form>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id') || '';

    document.getElementById('reservaIdLabel').textContent = id ? `#${id}` : '';
    document.getElementById('cliente').value = params.get('cliente') || '';
    document.getElementById('habitacion').value = params.get('habitacion') || '';
    document.getElementById('checkin').value = params.get('checkin') || '';
    document.getElementById('checkout').value = params.get('checkout') || '';

    document.getElementById('formEditar').addEventListener('submit', function(e) {
        e.preventDefault();
        document.getElementById('msgArea').innerHTML = `
            <div class="dynamic-msg">
                <i class="fas fa-check-circle"></i>
                Cambios guardados para la reserva ${id ? '#' + id : ''}. Redirigiendo al panel...
            </div>`;
        setTimeout(() => { window.location.href = 'admin.html'; }, 1400);
    });
</script>
</body>
</html>
